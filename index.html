<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Linkage</title>

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Linkage">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#eef3fb;
  text-align:center;
  padding-bottom:40px;
}
.header{
  padding:35px 20px 15px;
}
.logo{
  width:120px;
  height:120px;
  margin:auto;
  object-fit:contain;
  border-radius:24px;
}
.title{
  font-size:34px;
  font-weight:bold;
  margin-top:12px;
}
.sub{
  color:#666;
  margin-top:4px;
  margin-bottom:20px;
}
.nameBox{
  max-width:480px;
  margin:0 auto 18px;
  padding:12px;
  background:white;
  border-radius:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.btn{
  width:90%;
  max-width:480px;
  margin:12px auto;
  padding:18px;
  font-size:18px;
  border:none;
  border-radius:16px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  display:block;
  box-shadow:0 3px 8px rgba(0,0,0,.16);
}
.job{
  background:linear-gradient(180deg,#22c55e,#15803d);
}
.resume{
  background:linear-gradient(180deg,#3b82f6,#1d4ed8);
}
.admin{
  background:linear-gradient(180deg,#64748b,#334155);
}
.note{
  max-width:480px;
  margin:20px auto;
  padding:12px;
  color:#666;
  font-size:14px;
  line-height:1.6;
}
</style>
</head>

<body>

<div class="header">
  <img src="icon.png" class="logo" alt="Linkageロゴ">
  <div class="title">Linkage</div>
  <div class="sub">メニュー</div>
</div>

<div class="nameBox" id="userBox">ログイン中</div>

<button class="btn job" onclick="goJob()">👥 求職者共有</button>
<button class="btn resume" onclick="goResume()">📝 履歴書作成</button>

<div class="note">
  求職者共有と履歴書作成の入口です。<br>
  URLの最後に <b>?name=猪俣</b> のように付けると、各画面へ名前を引き継ぎます。
</div>

<script>
/* ===== URL設定 ===== */
/* 求職者共有GASのURLをここに入れてください */
const JOB_URL = "https://script.google.com/macros/s/AKfycbwu3me6U1IZ5JJkNHqf4V14Ecj4fQtfz6NDOe05p0XwqmDyNIKB-UKCPSi1tULrY3Dl/exec";

/* 履歴書作成GAS */
const RESUME_URL = "https://script.google.com/macros/s/AKfycbwjseBzgfOs4GirigT3_XB1LCnN2oQCUxI_7oKyupRt5Sp6wkiPJdIkt3yqxsR0cwYf/exec";

/* ===== 名前取得 ===== */
const params = new URLSearchParams(window.location.search);
const empName = (params.get("name") || "").trim();

function escapeHtml(text){
  return String(text || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function renderUserName(){
  const box = document.getElementById("userBox");
  if(empName){
    box.innerHTML = "<b>" + escapeHtml(empName) + "</b> さんでログイン中";
  }else{
    box.textContent = "名前がありません";
  }
}

function appendName(url){
  let result = String(url || "").trim();

  if(!result || result.includes("ここに")){
    alert("URLがまだ設定されていません。");
    return "";
  }

  if(empName){
    result += (result.includes("?") ? "&" : "?") + "name=" + encodeURIComponent(empName);
  }

  result += (result.includes("?") ? "&" : "?") + "t=" + Date.now();

  return result;
}

function move(url){
  const target = appendName(url);
  if(target){
    location.href = target;
  }
}

function goJob(){
  move(JOB_URL);
}

function goResume(){
  move(RESUME_URL);
}

renderUserName();
</script>

</body>
</html>
